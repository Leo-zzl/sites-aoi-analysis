name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      LANG: en_US.UTF-8
      PYTHONIOENCODING: utf-8
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pyinstaller pytest

      - name: Package Python backend with PyInstaller
        run: |
          pyinstaller --name site-analysis-api `
            --collect-all site_analysis `
            --collect-all uvicorn `
            --collect-all fastapi `
            --collect-all starlette `
            --collect-all geopandas `
            --collect-all shapely `
            --collect-all fiona `
            --collect-all pyproj `
            --collect-all pandas `
            --collect-all numpy `
            --collect-all scipy `
            --collect-all openpyxl `
            --collect-all python_multipart `
            scripts/api_entry.py
        shell: pwsh

      - name: Prepare backend for electron-builder
        run: |
          New-Item -ItemType Directory -Force -Path dist-backend
          Copy-Item -Recurse -Force dist/site-analysis-api dist-backend/site-analysis-api
        shell: pwsh

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm dependencies
        run: npm ci

      - name: Build Windows app
        run: npx electron-builder --win --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run release smoke tests
        run: pytest tests/integration/test_release_build.py -v -m release

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            dist/*.exe
            dist/*.zip

  build-macos:
    runs-on: macos-latest
    env:
      LANG: en_US.UTF-8
      PYTHONIOENCODING: utf-8
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pyinstaller pytest

      - name: Package Python backend with PyInstaller
        run: |
          pyinstaller --name site-analysis-api \
            --collect-all site_analysis \
            --collect-all uvicorn \
            --collect-all fastapi \
            --collect-all starlette \
            --collect-all geopandas \
            --collect-all shapely \
            --collect-all fiona \
            --collect-all pyproj \
            --collect-all pandas \
            --collect-all numpy \
            --collect-all scipy \
            --collect-all openpyxl \
            --collect-all python_multipart \
            scripts/api_entry.py

      - name: Prepare backend for electron-builder
        run: |
          mkdir -p dist-backend
          cp -r dist/site-analysis-api dist-backend/site-analysis-api

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm dependencies
        run: npm ci

      - name: Build macOS app
        run: npx electron-builder --mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run release smoke tests
        run: pytest tests/integration/test_release_build.py -v -m release

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: dist/*.dmg

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: dist/windows

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-build
          path: dist/macos

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/windows/*
            dist/macos/*
          draft: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
